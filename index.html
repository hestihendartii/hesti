<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rental Sport</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .logo i {
            font-size: 50px;
            color: white;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            border: 2px solid #ccc;
            border-radius: 10px;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: #667eea;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .demo-info {
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 10px;
            font-size: 13px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="login-card">

        <div class="logo-container">
            <div class="logo">
                <i class="fas fa-futbol"></i>
            </div>
            <h2>Rental Sport</h2>
            <p>Aplikasi Peminjaman Alat Olahraga</p>
        </div>

        <!-- FORM (tidak aktif tanpa PHP) -->
        <form action="login.php" method="POST">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="demo-info">
            <p><strong>Demo Login:</strong></p>
            <p>Admin: admin / admin123</p>
            <p>Petugas: petugas / petugas123</p>
        </div>

        <div class="footer">
            &copy; 2024 Rental Sport
        </div>

    </div>
</div>

</body>
</html>
